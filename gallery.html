<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mountain Adventure</title>
    <meta name="description" content="Explore a stunning collection of photographs from our Himalayan treks. From snow-capped peaks to lush alpine meadows, witness the beauty of Uttarakhand through our lens.">
        <!-- Google Fonts Preconnect and stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header scrolled"></header>

    <main class="pt-header">
        <section class="page-header-banner" style="background-image: url('img/gallery_hero.webp');">
            <div class="container">
                <h1>Our Adventure Gallery</h1>
                <p>Capturing the beauty of the Himalayas.</p>
            </div>
        </section>

        <section class="gallery-section py-80">
            <div class="container">
                <div class="treks-grid grid grid-responsive gap-20">
                    <div class="card-container"><img src="img/gallery/chopta.webp" class="img-zoom" alt="Chopta"></div>
                    <div class="card-container"><img src="img/gallery/harki-dun.webp" class="img-zoom" alt="Har ki Dun"></div>
                    <div class="card-container"><img src="img/gallery/himalaya-camp.webp" class="img-zoom" alt="Himalaya Camp"></div>
                    <div class="card-container"><img src="img/gallery/kedarnath.webp" class="img-zoom" alt="Kedarnath"></div>
                    <div class="card-container"><img src="img/gallery/mountain-river.webp" class="img-zoom" alt="Mountain River"></div>
                    <div class="card-container"><img src="img/gallery/roopkund.webp" class="img-zoom" alt="Roopkund"></div>
                    <div class="card-container"><img src="img/gallery/snow-trek.webp" class="img-zoom" alt="Snow Trek"></div>
                    <div class="card-container"><img src="img/gallery/sunrise-peak.webp" class="img-zoom" alt="Sunrise Peak"></div>
                    <div class="card-container"><img src="img/gallery/valley-flowers.webp" class="img-zoom" alt="Valley of Flowers"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="data/treks.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
