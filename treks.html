<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treks by Region | Mountain Adventure</title>
        <!-- Google Fonts Preconnect and stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .region-card-wrap {
            position: relative;
            display: block;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/10;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .region-card-wrap:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,123,255,0.15);
        }
        .region-card-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .region-card-wrap:hover img {
            transform: scale(1.06); 
        }
        .region-card-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            color: var(--white);
            padding: 40px 20px 20px;
            text-align: center;
        }
        .region-card-title h3 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .region-card-title p {
            font-size: 0.9rem;
            color: #ddd;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }
        @media (max-width: 900px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header scrolled"></header>

    <main class="pt-header">
        <section class="page-header-banner" style="background-image: url('img/hero.webp');">
            <div class="hero-overlay"></div>
            <div class="container text-center">
                <h1>Explore By Region</h1>
            </div>
        </section>

        <section class="py-80 bg-offset">
            <div class="container">
                <div class="section-title">
                    <h2>Trending Adventures</h2>
                    <p>Handpicked popular treks for you</p>
                </div>
                <!-- This will be populated by a new JS function or renderFeaturedTreks -->
                <div id="trending-treks-grid" class="grid grid-3 gap-30"></div>
            </div>
        </section>

        <section class="py-80 bg-white">
            <div class="container">
                <div class="section-title">
                    <h2>Discover All Treks</h2>
                    <p>Browse our complete catalog of Himalayan explorations</p>
                </div>
                <div id="all-treks-grid" class="grid grid-responsive gap-40"></div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="data/treks.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
