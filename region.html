<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Region Treks | Mountain Adventure</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header scrolled"></header>

    <main class="pt-header">
        <section class="page-header-banner" style="background-image: url('img/hero.webp'); background-position: center; border-radius: unset; margin: 0; padding: 120px 0;">
            <div class="container text-center">
                <h1 id="region-title" style="color: var(--white); text-shadow: 2px 2px 10px rgba(0,0,0,0.6); font-size: 3.5rem;">Explore Treks</h1>
            </div>
        </section>

        <section class="py-80 bg-white">
            <div class="container">
                <div id="region-treks-grid" class="grid grid-responsive gap-40">
                    <!-- Treks injected by scripts.js renderRegionTreks() -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="data/treks.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
