<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Mountain Adventure</title>
    <meta name="description" content="Get in touch with Mountain Adventure to plan your next Himalayan trek. Whether you have questions about routes, gear, or booking, our expert team is here to help.">
        <!-- Google Fonts Preconnect and stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact.css">
    <script src="https://unpkg.com/lucide@0.292.0/dist/umd/lucide.min.js" defer></script>
</head>
<body>
    <header class="header scrolled"></header>

    <main class="pt-header">
        <section class="page-header-banner" style="background-image: url('img/contact_hero.webp');">
            <div class="container">
                <h1>Contact Us</h1>
                <p>We're here to help you plan your perfect adventure.</p>
            </div>
        </section>

        <section class="py-80">
            <div class="container">
                <div class="section-title">
                    <h2>Send us a Message</h2>
                    <p>Have questions? We'd love to hear from you.</p>
                </div>
                <div class="contact-grid grid grid-2 gap-60">
                    <div class="contact-form-container">
                        <form class="contact-form">
                            <div class="contact-name-grid grid grid-2 gap-20 width-100">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" placeholder="John" required>
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" placeholder="Doe" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" placeholder="john@example.com" required>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" placeholder="+91 1234567890">
                            </div>
                            <div class="form-group">
                                <label>Message</label>
                                <textarea rows="5" placeholder="Tell us about your next adventure..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Connect With Us</button>
                        </form>
                    </div>
                    
                    <div class="contact-info-wrapper flex flex-col gap-60">
                        <div class="contact-info card-container p-40">
                            <h2>Contact Information</h2>
                            <ul class="info-list mt-20">
                                <li>
                                    <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px; color: var(--primary);"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Location</h4>
                                    <p>Himalayan Valley, North India</p>
                                </li>
                                <li>
                                    <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px; color: var(--primary);"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg> Call Us</h4>
                                    <p>+91 98XXX XXXXX</p>
                                </li>
                                <li>
                                    <h4><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 5px; color: var(--primary);"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> Email Us</h4>
                                    <p>hello@youradventurecompany.com</p>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="social-wrapper" style="background: var(--bg-offset); padding: 40px; border-radius: 12px;">
                            <h2>Follow Us</h2>
                            <div style="display: flex; gap: 15px; margin-top: 20px;">
                                <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg></a>
                                <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
                                <a href="#" style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"></polygon></svg></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="map-container" style="margin-top: 100px; border-top: 1px solid #eee;">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d110191.17835106967!2d77.93514930376518!3d30.325553195029415!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390929c356c888af%3A0x4c3562c032518799!2sDehradun%2C%20Uttarakhand!5e0!3m2!1sen!2sin!4v1703080000000!5m2!1sen!2sin" width="100%" height="450" style="border:0; display: block;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="data/treks.js"></script>
    <script src="js/scripts.js"></script>
</body>
</html>
